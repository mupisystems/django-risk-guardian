name: Bug Report
description: Report a bug in django-risk-guardian
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure RISK_GUARDIAN with...
        2. Send a request to...
        3. Observe that...
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: input
    id: django-version
    attributes:
      label: Django version
      placeholder: "5.2"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: django-risk-guardian version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: RISK_GUARDIAN config
      description: Your settings.RISK_GUARDIAN dict (if customized).
      render: python
